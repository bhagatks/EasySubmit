# Chrome extension → Chrome Web Store (web app deploys separately via Vercel GitHub integration).
name: Chrome Extension — Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      publish_to_cws:
        description: Upload signed CRX to Chrome Web Store (manual — check after each release)
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "extension/**"
      - "src/shared/**"
      - "scripts/build-extension.mjs"
      - "scripts/pack-extension-crx.mjs"
      - "scripts/upload-extension-cws.mjs"
      - "scripts/generate-extension-icons.mjs"
      - ".github/workflows/deploy.yml"

concurrency:
  group: chrome-extension-cws
  cancel-in-progress: false

jobs:
  publish-extension:
    runs-on: ubuntu-latest
    env:
      # postinstall runs prisma generate; config requires URLs but CI does not connect to a DB.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --config config/vitest.config.ts

      - name: Build extension (Chrome Web Store)
        run: npm run build:extension:store
        env:
          # Optional: add GitHub secret EXTENSION_POSTHOG_KEY (prod phc_) for store analytics
          NEXT_PUBLIC_APP_URL: https://www.easysubmit.ai
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.EXTENSION_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          NEXT_PUBLIC_ANALYTICS_ENABLED: "true"
          NEXT_PUBLIC_ANALYTICS_ENV: prod

      - name: Pack signed CRX + zip (Verified CRX uploads)
        run: node scripts/pack-extension-crx.mjs
        env:
          CHROME_CRX_PRIVATE_KEY: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}

      - name: Upload store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easysubmit-extension
          path: |
            easysubmit-extension.crx
            easysubmit-extension.zip
          retention-days: 30

      - name: Publish to Chrome Web Store
        if: github.event_name == 'workflow_dispatch' && inputs.publish_to_cws == true
        run: node scripts/upload-extension-cws.mjs
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CWS_PUBLISH: "true"
