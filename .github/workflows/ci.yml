# Web app CI — tests only. Deploy: Vercel GitHub integration (see docs/DEPLOYMENT.md).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # postinstall runs prisma generate; config requires URLs but CI does not connect to a DB.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx vitest run --config config/vitest.config.ts
